name: Deploy Preview (on push)

on:
  push:
    branches:
      - '**'
      - '!main' # main ships to the live channel via production.yml
    # Only rebuild/redeploy when the web bundle can actually change. A docs-,
    # test- or native-only commit produces an identical `flutter build web`,
    # and Firebase rejects re-releasing an identical version to a channel
    # (FAILED_PRECONDITION: "version is the current active version").
    paths:
      - 'lib/**'
      - 'web/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/preview.yml'

# Supersede an in-flight preview for the same branch instead of racing it.
concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_preview:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - run: flutter pub get
      - run: flutter build web --release

      # Scripted deploy instead of FirebaseExtended/action-hosting-deploy: a
      # transient "premature close" on the release POST makes firebase-tools
      # retry a request that already succeeded, and the retry 400s with
      # FAILED_PRECONDITION "supplied version is the current active version".
      # That error means the release IS live, so we treat it as success.
      - name: Deploy to Firebase preview channel
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MUZICIAN_B0953 }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          # Channel id must match [a-zA-Z0-9_-]; mirror the action's slash->dash.
          channel="${REF_NAME//\//-}"
          set +e
          out=$(npx -y firebase-tools@latest hosting:channel:deploy "$channel" \
            --project muzician-b0953 --expires 7d 2>&1)
          code=$?
          set -e
          echo "$out"
          if [ "$code" -ne 0 ]; then
            if echo "$out" | grep -q "is the current active version"; then
              echo "::notice::Channel '$channel' already at this version (benign firebase-tools retry) — treating as success."
            else
              exit "$code"
            fi
          fi