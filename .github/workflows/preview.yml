name: Deploy Preview (on push)

on:
  push:
    branches:
      - '**'
      - '!main' # main ships to the live channel via production.yml
    # Only rebuild/redeploy when the web bundle can actually change. A docs-,
    # test- or native-only commit produces an identical `flutter build web`,
    # and Firebase rejects re-releasing an identical version to a channel
    # (FAILED_PRECONDITION: "version is the current active version").
    paths:
      - 'lib/**'
      - 'web/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/preview.yml'

# Supersede an in-flight preview for the same branch instead of racing it.
concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_preview:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - run: flutter pub get
      - run: flutter build web --release

      - name: Deploy to Firebase preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MUZICIAN_B0953 }}
          projectId: muzician-b0953
          channelId: ${{ github.ref_name }}