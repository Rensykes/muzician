name: Deploy Production (on push main)

on:
  push:
    branches:
      - 'main'
    # Only deploy live when the web bundle can actually change. A docs-, test-
    # or CI-only commit rebuilds an identical version, and the tolerant deploy
    # below already handles the "current active version" case; this just avoids
    # pointless live rebuilds. (The workflow file itself is intentionally NOT
    # here — editing CI must not trigger a production deploy of unchanged web.)
    paths:
      - 'lib/**'
      - 'web/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'

concurrency:
  group: production-live
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - run: flutter pub get
      - run: flutter build web --release

      # Scripted deploy instead of FirebaseExtended/action-hosting-deploy: a
      # transient "premature close" (or an unchanged bundle) makes firebase-tools
      # retry a release that already landed, and the retry 400s with
      # FAILED_PRECONDITION "supplied version is the current active version" on
      # channels/live. That means live already serves this version, so we treat
      # it as success. Mirrors the preview workflow.
      - name: Deploy to Firebase live channel
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MUZICIAN_B0953 }}
        run: |
          set -euo pipefail
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          set +e
          out=$(npx -y firebase-tools@latest deploy --only hosting \
            --project muzician-b0953 2>&1)
          code=$?
          set -e
          echo "$out"
          if [ "$code" -ne 0 ]; then
            if echo "$out" | grep -q "is the current active version"; then
              echo "::notice::Live channel already at this version (benign firebase-tools retry) — treating as success."
            else
              exit "$code"
            fi
          fi