name: Deploy Production (on push main)

on:
  push:
    branches:
      - 'main'
    # Skip when the web bundle can't have changed — otherwise a docs-/test-only
    # commit rebuilds an identical version and Firebase rejects re-releasing it
    # to the live channel (FAILED_PRECONDITION: "version is the current active
    # version").
    paths:
      - 'lib/**'
      - 'web/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/production.yml'

concurrency:
  group: production-live
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - run: flutter pub get
      - run: flutter build web --release

      - name: Deploy to Firebase live channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MUZICIAN_B0953 }}
          projectId: muzician-b0953
          channelId: live